<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="base" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020617"/>
      <stop offset=".5" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#1e1b4b"/>
    </linearGradient>
    <radialGradient id="glow1" cx="16%" cy="20%" r="55%">
      <stop offset="0" stop-color="#6366f1" stop-opacity=".45"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="86%" cy="88%" r="55%">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity=".4"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#base)"/>
  <rect width="1600" height="900" fill="url(#glow1)"/>
  <rect width="1600" height="900" fill="url(#glow2)"/>
  <!-- 연결 노드 모티프 (협업) -->
  <g stroke="#ffffff" stroke-opacity=".08" stroke-width="1.5">
    <line x1="1080" y1="180" x2="1300" y2="300"/>
    <line x1="1300" y1="300" x2="1180" y2="520"/>
    <line x1="1080" y1="180" x2="1180" y2="520"/>
    <line x1="1300" y1="300" x2="1460" y2="200"/>
  </g>
  <g fill="#c7d2fe" fill-opacity=".55">
    <circle cx="1080" cy="180" r="6"/>
    <circle cx="1300" cy="300" r="6"/>
    <circle cx="1180" cy="520" r="6"/>
    <circle cx="1460" cy="200" r="6"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="base" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e1b4b"/>
      <stop offset=".55" stop-color="#312e81"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="glow1" cx="76%" cy="22%" r="55%">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity=".55"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="18%" cy="82%" r="50%">
      <stop offset="0" stop-color="#6366f1" stop-opacity=".4"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#base)"/>
  <rect width="1600" height="900" fill="url(#glow1)"/>
  <rect width="1600" height="900" fill="url(#glow2)"/>
  <!-- 은은한 동심원 악센트 -->
  <g fill="none" stroke="#ffffff" stroke-opacity=".07" stroke-width="1.5">
    <circle cx="1230" cy="210" r="300"/>
    <circle cx="1230" cy="210" r="210"/>
    <circle cx="1230" cy="210" r="120"/>
  </g>
</svg>
